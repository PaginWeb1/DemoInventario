<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario App - Login</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">

<div class="login-container">
    <h1>📦 Inventario App</h1>
    <input type="text" id="usuario" placeholder="Nombre del negocio">
    <input type="password" id="clave" placeholder="Clave de acceso">
    <button id="btnLogin">Ingresar</button>
    <p id="mensajeError" class="mensaje-error"></p>
</div>

<script src="js/auth.js"></script>
<script>
document.getElementById("btnLogin").addEventListener("click", login);
</script>
</body>
</html>
