<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Pro | Sistema Comercial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
    color:#1e293b;
}

/* LOGIN */
.login-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:320px;
}

.login-box h2{
    margin-bottom:20px;
    text-align:center;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
}

/* APP */
#app{
    display:none;
}

header{
    background:#0f172a;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header button{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    max-width:1200px;
    margin:25px auto;
    padding:0 15px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card p{
    font-size:22px;
    font-weight:700;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    margin-bottom:15px;
}

input{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-success{
    background:#16a34a;
    color:white;
}

.btn-danger{
    background:#ef4444;
    color:white;
}

.table-container{
    background:white;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

/* MOBILE */
@media(max-width:768px){
    table, thead, tbody, th, td, tr{
        display:block;
    }

    thead{display:none;}

    tr{
        margin-bottom:15px;
        padding:10px;
        border-bottom:1px solid #ccc;
    }

    td{
        display:flex;
        justify-content:space-between;
    }

    td:before{
        font-weight:600;
    }

    td:nth-child(1):before{content:"Producto";}
    td:nth-child(2):before{content:"Cantidad";}
    td:nth-child(3):before{content:"Precio";}
    td:nth-child(4):before{content:"Total";}
    td:nth-child(5):before{content:"Acción";}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="login">
    <div class="login-box">
        <h2>Inventario Pro</h2>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Ingresar</button>
    </div>
</div>

<!-- APP -->
<div id="app">
<header>
    <div>Inventario Pro</div>
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
</header>

<div class="container">

<div class="dashboard">
    <div class="card">
        <div>Total Productos</div>
        <p id="totalProductos">0</p>
    </div>
    <div class="card">
        <div>Total Unidades</div>
        <p id="totalUnidades">0</p>
    </div>
    <div class="card">
        <div>Valor Total</div>
        <p id="valorTotal">$0</p>
    </div>
</div>

<div class="form-grid">
    <input type="text" id="nombre" placeholder="Producto">
    <input type="number" id="cantidad" placeholder="Cantidad">
    <input type="number" id="precio" placeholder="Precio">
    <button class="btn-primary" onclick="agregarProducto()">Agregar</button>
    <button class="btn-success" onclick="exportarExcel()">Exportar Excel</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaProductos"></tbody>
</table>
</div>

</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("inventarioPro")) || [];

function iniciarSesion(){
    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    if(usuario==="admin" && password==="1234"){
        localStorage.setItem("sesionActiva","true");
        mostrarApp();
    }else{
        alert("Credenciales incorrectas");
    }
}

function cerrarSesion(){
    localStorage.removeItem("sesionActiva");
    location.reload();
}

function mostrarApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
}

if(localStorage.getItem("sesionActiva")==="true"){
    mostrarApp();
}

function guardar(){
    localStorage.setItem("inventarioPro", JSON.stringify(productos));
}

function formatoCLP(valor){
    return valor.toLocaleString("es-CL",{style:"currency",currency:"CLP"});
}

function agregarProducto(){
    const nombre = document.getElementById("nombre").value.trim();
    const cantidad = parseInt(document.getElementById("cantidad").value);
    const precio = parseFloat(document.getElementById("precio").value);

    if(!nombre || cantidad<=0 || precio<=0){
        alert("Complete los campos correctamente");
        return;
    }

    productos.push({nombre,cantidad,precio});
    guardar();
    limpiar();
    mostrarProductos();
}

function eliminarProducto(index){
    productos.splice(index,1);
    guardar();
    mostrarProductos();
}

function mostrarProductos(){
    const tabla = document.getElementById("tablaProductos");
    tabla.innerHTML="";
    let totalUnidades=0;
    let valorTotal=0;

    productos.forEach((p,index)=>{
        let total=p.cantidad*p.precio;
        totalUnidades+=p.cantidad;
        valorTotal+=total;

        tabla.innerHTML+=`
        <tr>
            <td>${p.nombre}</td>
            <td>${p.cantidad}</td>
            <td>${formatoCLP(p.precio)}</td>
            <td>${formatoCLP(total)}</td>
            <td><button class="btn-danger" onclick="eliminarProducto(${index})">Eliminar</button></td>
        </tr>`;
    });

    document.getElementById("totalProductos").innerText=productos.length;
    document.getElementById("totalUnidades").innerText=totalUnidades;
    document.getElementById("valorTotal").innerText=formatoCLP(valorTotal);
}

function limpiar(){
    nombre.value="";
    cantidad.value="";
    precio.value="";
}

/* EXPORTAR CSV (Excel) */
function exportarExcel(){
    let csv="Producto,Cantidad,Precio,Total\n";
    productos.forEach(p=>{
        csv+=${p.nombre},${p.cantidad},${p.precio},${p.cantidad*p.precio}\n;
    });

    let blob=new Blob([csv],{type:"text/csv"});
    let url=URL.createObjectURL(blob);
    let a=document.createElement("a");
    a.href=url;
    a.download="inventario.csv";
    a.click();
}

mostrarProductos();
</script>

</body>
</html>
